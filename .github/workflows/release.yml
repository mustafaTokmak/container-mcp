name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # macos-latest, not ubuntu: the test suite (npm test) and prepublishOnly
    # both run on macOS in CI today, and although the non-live suite needs no
    # container CLI, keeping the release job on the same OS as the CI job
    # guarantees the published artifact is built and tested under the exact
    # platform the package declares ("os": ["darwin"]). No cross-OS surprises.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
